name: Deploy Hakyll Site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10' # Adjust as needed
          cabal-version: 'latest'

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-haskell-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-haskell-

      - name: Build site generator
        run: cabal build

      - name: Generate site
        run: cabal run site -- build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
